<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Last Starship Save Editor (v28)</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; line-height: 1.6; }
        h1 { color: #1eaedb; }
        button { padding: 12px 24px; font-size: 16px; margin: 10px 5px; background: #33c3f0; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #1eaedb; }
        input[type="file"] { margin: 20px 0; }
        pre { background: #f8f8f8; padding: 15px; border: 1px solid #ddd; overflow: auto; max-height: 600px; font-family: monospace; }
        .error { color: red; background: #fee; padding: 10px; border: 1px solid red; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>The Last Starship — Save File Editor (SaveVersion 28)</h1>
    <p>Click below to open a .space save file. GridMap is automatically skipped.</p>

    <input type="file" id="fileInput" accept=".space">
    <br><br>
    <button onclick="downloadEdited()">Download Edited Save</button>

    <h2>Parsed Save Data</h2>
    <pre id="output">Load a file to see the data here...</pre>

    <script>
        let parsedData = {};

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    parsedData = parseSaveFile(ev.target.result);
                    document.getElementById('output').textContent = JSON.stringify(parsedData, null, 2);
                    console.log("✅ Loaded successfully!");
                } catch(err) {
                    document.getElementById('output').innerHTML = `<div class="error">Error: ${err.message}</div>`;
                    console.error(err);
                }
            };
            reader.readAsText(file);
        });

        function parseSaveFile(text) {
            const tokens = text.split(/\s+/).filter(Boolean);
            let i = 0;
            const result = {};
            const stack = [result];

            while (i < tokens.length) {
                let token = tokens[i];

                if (token === "BEGIN") {
                    i++;
                    let key = tokens[i].replace(/^"|"$/g, '');
                    i++;
                    const newObj = {};
                    if (Array.isArray(stack[stack.length-1])) {
                        stack[stack.length-1].push(newObj);
                    } else {
                        if (!stack[stack.length-1][key]) stack[stack.length-1][key] = newObj;
                        else if (Array.isArray(stack[stack.length-1][key])) stack[stack.length-1][key].push(newObj);
                        else stack[stack.length-1][key] = [stack[stack.length-1][key], newObj];
                    }
                    stack.push(newObj);
                } else if (token === "END") {
                    stack.pop();
                    i++;
                } else if (token === "SaveVersion") {
                    i++;
                    stack[stack.length-1][token] = parseInt(tokens[i], 10);
                    i++;
                } else if (token === "BEGIN" && tokens[i+1] === "GridMap") {
                    // Skip GridMap
                    i += 2;
                    let depth = 1;
                    while (i < tokens.length && depth > 0) {
                        if (tokens[i] === "BEGIN") depth++;
                        else if (tokens[i] === "END") depth--;
                        i++;
                    }
                } else {
                    const key = token;
                    i++;
                    let val = tokens[i];
                    if (val && val.startsWith('"')) val = val.slice(1, -1);
                    else if (val && !isNaN(val)) val = parseFloat(val);
                    stack[stack.length-1][key] = val;
                    i++;
                }
            }
            return result;
        }

        function downloadEdited() {
            if (Object.keys(parsedData).length === 0) {
                alert("Please load a file first!");
                return;
            }
            const text = JSON.stringify(parsedData, null, 2);
            const blob = new Blob([text], {type: 'text/plain'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'edited-save.space';
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
