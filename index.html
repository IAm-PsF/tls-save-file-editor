<body>
    <div class="container">
        <h1>The Last Starship — Save File Editor (SaveVersion 28)</h1>
        <p>Click below to open a .space save file. GridMap is automatically skipped.</p>

        <input type="file" id="fileInput" accept=".space">
        <br><br>
        <button onclick="downloadEdited()">Download Edited Save</button>

        <h2>Parsed Save Data</h2>
        <pre id="output">Load a file to see the data here...</pre>
    </div>

    <script>
        let parsedData = {};

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    parsedData = parseSaveFile(ev.target.result);
                    document.getElementById('output').textContent = JSON.stringify(parsedData, null, 2);
                    console.log("✅ Loaded successfully!");
                } catch(err) {
                    document.getElementById('output').innerHTML = `<div style="color:red; padding:10px; border:1px solid red;">Error: ${err.message}</div>`;
                    console.error(err);
                }
            };
            reader.readAsText(file);
        });

        function parseSaveFile(text) {
            const tokens = text.split(/\s+/).filter(Boolean);
            let i = 0;
            const result = {};
            const stack = [result];

            while (i < tokens.length) {
                let token = tokens[i];

                if (token === "BEGIN") {
                    i++;
                    let key = tokens[i];
                    if (key.startsWith('"') && key.endsWith('"')) key = key.slice(1, -1);
                    i++;

                    const parent = stack[stack.length - 1];
                    const newObj = {};

                    if (Array.isArray(parent)) {
                        parent.push(newObj);
                    } else {
                        if (parent[key] === undefined) {
                            parent[key] = newObj;
                        } else if (Array.isArray(parent[key])) {
                            parent[key].push(newObj);
                        } else {
                            parent[key] = [parent[key], newObj];
                        }
                    }
                    stack.push(newObj);
                } else if (token === "END") {
                    stack.pop();
                    i++;
                } else if (token === "SaveVersion") {
                    i++;
                    stack[stack.length-1][token] = parseInt(tokens[i], 10);
                    i++;
                } else if (token === "BEGIN" && tokens[i+1] === "GridMap") {
                    i += 2;
                    let depth = 1;
                    while (i < tokens.length && depth > 0) {
                        if (tokens[i] === "BEGIN") depth++;
                        else if (tokens[i] === "END") depth--;
                        i++;
                    }
                } else {
                    const key = token;
                    i++;
                    let val = tokens[i];
                    if (val && val.startsWith('"')) val = val.slice(1, -1);
                    else if (val && !isNaN(val)) val = parseFloat(val);
                    stack[stack.length-1][key] = val;
                    i++;
                }
            }
            return result;
        }

        function downloadEdited() {
            if (Object.keys(parsedData).length === 0) {
                alert("Please load a file first!");
                return;
            }
            const text = JSON.stringify(parsedData, null, 2);
            const blob = new Blob([text], {type: 'text/plain'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'edited-save.space';
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
