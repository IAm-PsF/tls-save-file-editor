<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" href="./favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="//fonts.googleapis.com/css?family=Orbitron:400,300,600" rel="stylesheet" type="text/css" />
    <link href="//fonts.googleapis.com/css?family=Raleway:400,300,600" rel="stylesheet" type="text/css" />
    <title>The Last Starship -- Save File Editor</title>
    
    <!-- Load your edited JS -->
    <script type="module" crossorigin src="./assets/index.f5103e52.js"></script>
    <link rel="stylesheet" href="./assets/index.ed6bea94.css">
    
    <!-- Fallback message if JS fails to load -->
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .fallback { color: red; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container" id="app"></div>
    
    <script>
        // Small safety check
        window.addEventListener('load', () => {
            setTimeout(() => {
                if (!document.getElementById('app').innerHTML.trim()) {
                    const fallback = document.createElement('div');
                    fallback.className = 'fallback';
                    fallback.innerHTML = `
                        <p>The main editor failed to load (likely due to syntax error in the JS file).</p>
                        <p>Try these steps:</p>
                        <ol>
                            <li>Go back to your <code>index.f5103e52.js</code> file</li>
                            <li>Remove everything before the line <code>(function(){const t=...</code></li>
                            <li>Make sure the parser function is placed right at the top, before the big (function(){ ... }) block</li>
                            <li>Save, commit, push, and refresh this page</li>
                        </ol>
                    `;
                    document.body.appendChild(fallback);
                }
            }, 1500);
        });
    </script>
</body>
</html>
